# Release pipeline for reoclo-cli.
#
# Fires on `git push origin vX.Y.Z`. Builds 6 cross-platform binaries via
# bun's compile target, then publishes a release on both mirrors:
#   - Gitea  (git.boxpositron.dev/reoclo/reoclo-cli)
#   - GitHub (github.com/reoclo/cli)
# Finally, refreshes the Homebrew tap at reoclo/homebrew-tap so
# `brew install reoclo/tap/reoclo` resolves to the new version.
#
# Required Woodpecker secrets (set at the repo level):
#   gitea_release_token  — Gitea PAT with write:repository scope
#   github_release_token — GitHub PAT with contents:write on reoclo/cli
#   homebrew_tap_token   — GitHub PAT with contents:write on reoclo/homebrew-tap
#                          (optional: if unset, the homebrew step logs and skips)
#
# Re-running the same tag is safe: an existing release with the same tag is
# reused, and assets that are already attached are skipped — a retry after a
# failed upload only ships what wasn't there yet. The homebrew step is also
# idempotent: an unchanged formula is detected by content compare and skipped.

steps:
  # CI on pull requests + main pushes: the same gate the release runs (per-file
  # unit loop + typecheck + build), minus the publish scripts. Catches breakage
  # (e.g. a bash-ism in packaging/install.sh) before it reaches a release tag.
  - name: test
    image: oven/bun:1.3.11-slim
    when:
      - event: pull_request
      - event: push
        branch: main
    commands:
      - apt-get update
      - apt-get install -y --no-install-recommends curl jq ca-certificates git python3 build-essential
      - bun install --frozen-lockfile
      - 'set -e; for f in $(find tests/unit -name "*.test.ts" | sort); do echo "==> $f"; bun test "$f" > /tmp/reoclo-test.log 2>&1 || { cat /tmp/reoclo-test.log; echo "FAILED: $f"; exit 1; }; done'
      - bun run typecheck
      - bun run build

  - name: release
    image: oven/bun:1.3.11-slim
    when:
      - event: tag
        ref: refs/tags/v*
    environment:
      GITEA_API_URL: https://git.boxpositron.dev/api/v1
      GITEA_REPO: reoclo/reoclo-cli
      GITHUB_REPO: reoclo/cli
      GITEA_TOKEN:
        from_secret: gitea_release_token
      GITHUB_TOKEN:
        from_secret: github_release_token
      HOMEBREW_TAP_REPO: reoclo/homebrew-tap
      HOMEBREW_TAP_TOKEN:
        from_secret: homebrew_tap_token
    commands:
      - apt-get update
      # python3 + build-essential are required for node-pty's native build
      # (devDependency used only by the bash-completion e2e harness).
      - apt-get install -y --no-install-recommends curl jq ca-certificates git python3 build-essential
      - bun install --frozen-lockfile
      # Run each unit test file in its own bun process. Two observed cross-
      # file pollution sources on Linux that we can't reproduce on macOS:
      #   1. `mock.module()` is process-global and leaks between files
      #      (completion-warm.test.ts → cache/engine/index-client tests).
      #   2. Cache tests that toggle `process.env.REOCLO_CACHE_DIR` per-test
      #      sometimes see stale state across files inside one process.
      # Per-file invocation gives every file a fresh process and is bulletproof.
      - 'set -e; for f in $(find tests/unit -name "*.test.ts" | sort); do echo "==> $f"; bun test "$f" > /tmp/reoclo-test.log 2>&1 || { cat /tmp/reoclo-test.log; echo "FAILED: $f"; exit 1; }; done'
      - bun run typecheck
      - bun run build
      - cd dist && sha256sum reoclo-* > SHA256SUMS && cd ..
      - bash scripts/release.sh
      - bash scripts/publish-homebrew.sh
