when:
  - event: push
  - event: pull_request
  - event: tag

steps:
  lint:
    image: oven/bun:1
    commands:
      - bun install --frozen-lockfile
      - bun run lint

  typecheck:
    image: oven/bun:1
    commands:
      - bun install --frozen-lockfile
      - bun run typecheck

  test:
    image: oven/bun:1
    commands:
      - bun install --frozen-lockfile
      - bun test --coverage

  build:
    image: oven/bun:1
    commands:
      - bun install --frozen-lockfile
      - bun run build
      - ls -la dist/
    when:
      - event: tag
      - event: push
        branch: main

  release:
    image: oven/bun:1
    when:
      - event: tag
    environment:
      GITEA_TOKEN:
        from_secret: gitea_release_token
      GITHUB_TOKEN:
        from_secret: github_release_token
      NPM_TOKEN:
        from_secret: npm_token
      MINIO_ENDPOINT_URL:
        from_secret: minio_endpoint_url
      MINIO_ACCESS_KEY:
        from_secret: minio_access_key
      MINIO_SECRET_KEY:
        from_secret: minio_secret_key
    commands:
      - bun install --frozen-lockfile
      - bun run build                       # produces dist/reoclo-*
      - bash scripts/release-checksums.sh   # SHA256SUMS in dist/
      - bash scripts/release-gitea.sh       # uploads binaries + SHA256SUMS to Gitea release
      - bash scripts/release-github.sh      # mirrors release to github.com/reoclo/cli
      - bash scripts/publish-npm.sh
      - bash scripts/update-get-pointer.sh  # pushes install.sh + channel pointer to MinIO
      # TODO(7.5 prereq): bash scripts/update-homebrew.sh — requires reoclo/homebrew-tap with push key
